
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Backoffice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        /* Títulos */
        h2 {
            margin-top: 30px;
            color: #38bdf8;
        }

        /* Inputs */
        input {
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            width: 250px;
            background: #1e293b;
            color: white;
        }

        /* Botões */
        button {
            padding: 10px 15px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0ea5e9;
        }

        /* Lista */
        ul {
            list-style: none;
            padding: 0;
        }

        /* Card de pessoa */
        li {
            background: #1e293b;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Botão pequeno */
        li button {
            background: #22c55e;
            color: white;
        }

        li button:hover {
            background: #16a34a;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* Caixa criar pessoa */
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .detalhes {
            transition: all 0.3s ease;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="container">

    <h2>Criar Pessoa</h2>
    <div class="card">
        <input id="nome" placeholder="Nome"><br>
        <input id="idade" placeholder="Idade"><br>  
        <h5>Inserir local de residência</h5> 
        <input id="lat" placeholder="Latitude"><br>
        <input id="lon" placeholder="Longitude"><br>
        <h5>Ultimas localizações</h5>

        <div id="locContainer">
            <div class="loc">
                <input placeholder="Latitude">
                <input placeholder="Longitude">
                <input placeholder="Data">
                <input placeholder="Hora"><br>
            </div>
        </div>

        <button onclick="adicionarLocalizacao()">Adicionar localização</button><br>
        <input type="file" id="imagem"><br>
        <button onclick="criarPessoa()">Criar</button>
    </div>

    <h2>Pessoas</h2>
    <ul id="lista"></ul>

</div>

<script>
function adicionarLocalizacao() {
    let container = document.getElementById("locContainer");

    let nova = document.createElement("div");
    nova.classList.add("loc");
    // Adicionei uma margem inferior para separar as linhas visualmente
    nova.style.marginBottom = "10px"; 

    nova.innerHTML = `
        <input placeholder="Latitude">
        <input placeholder="Longitude">
        <input placeholder="Data">
        <input placeholder="Hora">
        <button type="button" onclick="this.parentElement.remove()" 
                style="background: #ef4444; margin-left: 5px; padding: 5px 10px;">
            ✕
        </button>
    `;

    container.appendChild(nova);
}


let aberta = null

async function togglePessoa(id, element) {
    let li = element.parentElement
    let detalheDiv = li.querySelector(".detalhes")

    if (detalheDiv.dataset.loaded !== "true") {
        let res = await fetch(`http://127.0.0.1:8000/pessoas/${id}`)
        let p = await res.json()

        detalheDiv.innerHTML = `
            <p><b>ID:</b> ${p.id}</p>
            <p><b>Nome:</b> ${p.nome}</p>
            <p><b>Idade:</b> ${p.idade}</p>

            <b>Localização:</b>
            <p>
                Lat: ${p.local_de_residencia?.lat ?? "N/A"} |
                Lon: ${p.local_de_residencia?.lon ?? "N/A"}
            </p>

            <b>Histórico:</b>
            <ul>
                ${(p.localizacoes || []).map(loc => `
                    <li>${loc.lat} | ${loc.lon}</li>
                `).join("")}
            </ul>
        `

        detalheDiv.dataset.loaded = "true"
    }

    detalheDiv.style.display =
        detalheDiv.style.display === "block" ? "none" : "block"
}

async function criarPessoa() {
    let formData = new FormData()
    let fileInput = document.getElementById("imagem")

    let nome = document.getElementById("nome").value
    let idade = parseInt(document.getElementById("idade").value)
    let lat = parseFloat(document.getElementById("lat").value)
    let lon = parseFloat(document.getElementById("lon").value)
    // 🔴 validações (super importante)
    if (!nome) {
        alert("Nome é obrigatório")
        return
    }

    if (isNaN(idade)) {
        alert("Idade inválida")
        return
    }

    if (isNaN(lat) || isNaN(lon)) {
        alert("Latitude/Longitude inválidas")
        return
    }

    if (!fileInput.files[0]) {
        alert("Seleciona uma imagem")
        return
    }

    //enviar tudo corretamente
    formData.append("nome", nome)
    formData.append("idade", idade)
    formData.append("lat", lat)
    formData.append("lon", lon)
    formData.append("imagem", fileInput.files[0])

    // verificacao
    for (let pair of formData.entries()) {
    console.log(pair[0], pair[1])
    }

    let res = await fetch("http://127.0.0.1:8000/pessoas_criar", {
        method: "POST",
        body: formData
    })

    if (!res.ok) {
        alert("Erro ao criar pessoa")
        return
    }

    carregarPessoas()
}

async function carregarPessoas() {
    let res = await fetch("http://127.0.0.1:8000/pessoas_listar")
    let data = await res.json()

    let lista = document.getElementById("lista")
    lista.innerHTML = ""

    data.forEach(p => {
        let li = document.createElement("li")
        li.innerHTML = `
            <div onclick="togglePessoa('${p.id}', this)" style="cursor:pointer; width:100%">
                <strong>${p.nome}</strong>
            </div>

            <button onclick="event.stopPropagation(); addLoc('${p.id}')">
                + Localização
            </button>

            <div class="detalhes" style="display:none; margin-top:10px;"></div>
        `
        lista.appendChild(li)
    })
}

async function addLoc(id) {
    let lat = prompt("Latitude:")
    let lon = prompt("Longitude:")

    await fetch(`http://127.0.0.1:8000/pessoas/${id}/localizacao?lat=${lat}&lon=${lon}`, {
        method: "POST"
    })

    alert("Localização adicionada!")
}

carregarPessoas()
</script>

</body>
</html>
